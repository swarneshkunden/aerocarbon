version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - FRONTEND_ORIGIN=http://localhost:3000
      - NODE_ENV=production
    volumes:
      - backend-data:/app/prisma

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
    depends_on:
      - backend

volumes:
  backend-data: